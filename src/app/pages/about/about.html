<div class="container py-5">

  <div class="contact-hero-card rounded-4 p-4 p-md-5 text-center mb-5">
    <p class="contact-kicker mb-2">Contact Showtime</p>
    <h1 class="display-6 fw-bold text-white mb-2">Get in Touch</h1>
    <p class="text-muted mb-0">Have a question, suggestion, or partnership idea? We would love to hear from you.</p>
  </div>

  <div class="row g-4">

    <!-- Form -->
    <div class="col-md-7 mb-4">
      <div class="dark-card p-4 rounded-3">
        <h4 class="text-white mb-4">Send us a Message</h4>
        <form>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label text-muted">Name</label>
              <input type="text" class="form-control dark-input" placeholder="Your name">
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label text-muted">Email</label>
              <input type="email" class="form-control dark-input" placeholder="Your email">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label text-muted">Subject</label>
            <input type="text" class="form-control dark-input" placeholder="What is this about?">
          </div>
          <div class="mb-3">
            <label class="form-label text-muted">Message</label>
            <textarea class="form-control dark-input" rows="5" placeholder="Your message..."></textarea>
          </div>
          <button type="submit" class="btn btn-outline-light px-4">Send Message</button>
        </form>
      </div>
    </div>

    <!-- Contact Info -->
    <div class="col-md-5 mb-4">
      <div class="dark-card p-4 rounded-3">
        <h4 class="text-white mb-4">Contact Info</h4>

        <div class="d-flex mb-3">
          <div class="me-3 fs-5">📍</div>
          <div>
            <h6 class="text-white mb-1">Address</h6>
            <p class="text-muted mb-0">Angamaly, Kerala</p>
          </div>
        </div>

        <div class="d-flex mb-3">
          <div class="me-3 fs-5">📞</div>
          <div>
            <h6 class="text-white mb-1">Phone</h6>
            <p class="text-muted mb-0">+91 00000000</p>
          </div>
        </div>

        <div class="d-flex mb-3">
          <div class="me-3 fs-5">✉️</div>
          <div>
            <h6 class="text-white mb-1">Email</h6>
            <p class="text-muted mb-0">support@showtime.com</p>
          </div>
        </div>

        <div class="d-flex">
          <div class="me-3 fs-5">⏰</div>
          <div>
            <h6 class="text-white mb-1">Business Hours</h6>
            <p class="text-muted mb-0">Mon-Fri: 9AM - 6PM</p>
            <p class="text-muted mb-0">Sat-Sun: Closed</p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Map -->
  <div class="mt-4 rounded-3 overflow-hidden">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4923.895771857182!2d76.38413747590191!3d10.193221669678364!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3b080660822d8791%3A0x385f10ae7100641b!2sAngamaly%20Junction%2C%20Angamaly%2C%20Kerala%20683572!5e1!3m2!1sen!2sin!4v1773336692535!5m2!1sen!2sin"
      width="100%"
      height="400"
      style="border:0; display:block;"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>

</div>
