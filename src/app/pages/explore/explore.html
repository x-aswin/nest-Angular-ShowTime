<div class="container-fluid px-4">

  <div class="cta-banner rounded-4 p-5 text-center my-5">
    <h2 class="fw-bold text-white mb-2">Explore All Movies</h2>
    <p class="text-muted mb-4">Browse our full collection of 10,000+ films — filter, search and find your next watch</p>
  </div>

  @if (loading) {
    <div class="text-center py-5">
      <div class="spinner-border text-light" role="status"></div>
      <p class="text-muted mt-3">Fetching movies...</p>
    </div>
  } @else {
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-6 g-3">
      @for (item of movies; track item.id) {
        <div class="col">
          <app-card [movie]="item"></app-card>
        </div>
      } @empty {
        <p class="text-muted">No movies found.</p>
      }
    </div>
  }

</div>
